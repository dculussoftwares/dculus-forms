name: Setup DB Connection Secrets

# One-shot workflow that builds correct DATABASE_URL and DIRECT_URL secrets for
# every GitHub environment from the already-stored POSTGRES_ADMIN_PASSWORD.
#
# Why this is needed:
#   DATABASE_URL must target PgBouncer with ?pgbouncer=true&connection_limit=2
#   DIRECT_URL must target PostgreSQL directly (used by Prisma migrate for advisory locks)
#
# Run once after any infra change (new PgBouncer, DB rename, password rotation).
# Re-running is always safe — it just overwrites the existing values.

on:
  workflow_dispatch:

permissions:
  secrets: write
  contents: read

jobs:
  setup-db-secrets:
    name: Build & Set DATABASE_URL / DIRECT_URL
    runs-on: ubuntu-latest
    # Run inside 'dev' environment so POSTGRES_ADMIN_PASSWORD is available.
    # The password is identical for both dev and production (same PostgreSQL server).
    environment: dev
    env:
      GH_TOKEN: ${{ github.token }}
      PGBOUNCER_HOST: dculus-pgbouncer.ejfrc3bugjejc2d6.centralindia.azurecontainer.io
      DIRECT_HOST: dculus-shared-postgres.postgres.database.azure.com
      PG_USER: dculus_admin

    steps:
      - name: Build and set secrets for all environments
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          # URL-encode the password so special characters (e.g. +, @, #, %) are
          # safe inside a connection string URL.
          ENCODED_PASS=$(python3 -c \
            "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" \
            "$POSTGRES_ADMIN_PASSWORD")

          # Mask the encoded password so it never appears in logs even if leaked
          echo "::add-mask::$ENCODED_PASS"

          # ── dev environment ──────────────────────────────────────────────────
          DEV_DB="dculus_forms_dev_db"

          DEV_URL="postgresql://${PG_USER}:${ENCODED_PASS}@${PGBOUNCER_HOST}:5432/${DEV_DB}?pgbouncer=true&connection_limit=2&sslmode=disable"
          DEV_DIRECT="postgresql://${PG_USER}:${ENCODED_PASS}@${DIRECT_HOST}:5432/${DEV_DB}?sslmode=require"

          gh secret set DATABASE_URL \
            --env dev \
            --repo "$GITHUB_REPOSITORY" \
            --body "$DEV_URL"

          gh secret set DIRECT_URL \
            --env dev \
            --repo "$GITHUB_REPOSITORY" \
            --body "$DEV_DIRECT"

          echo "✅ dev: DATABASE_URL + DIRECT_URL set (db: ${DEV_DB})"

          # ── production environment ───────────────────────────────────────────
          PROD_DB="dculus_forms_prod_db"

          PROD_URL="postgresql://${PG_USER}:${ENCODED_PASS}@${PGBOUNCER_HOST}:5432/${PROD_DB}?pgbouncer=true&connection_limit=2&sslmode=disable"
          PROD_DIRECT="postgresql://${PG_USER}:${ENCODED_PASS}@${DIRECT_HOST}:5432/${PROD_DB}?sslmode=require"

          gh secret set DATABASE_URL \
            --env production \
            --repo "$GITHUB_REPOSITORY" \
            --body "$PROD_URL"

          gh secret set DIRECT_URL \
            --env production \
            --repo "$GITHUB_REPOSITORY" \
            --body "$PROD_DIRECT"

          echo "✅ production: DATABASE_URL + DIRECT_URL set (db: ${PROD_DB})"
