name: Build Pipeline

on:
  push:
    branches: [ main, develop, release ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  id-token: write
  contents: write
  packages: write

env:
  NODE_VERSION: '22.14.0'
  PNPM_VERSION: '8.15.0'
  REGISTRY: docker.io
  IMAGE_NAME: dculus/forms-backend
  # Backend URL for production builds 
  BACKEND_URL: https://dculus-forms-backend.reddune-e5ba9473.eastus.azurecontainerapps.io
  # Viewer URL used for linking out of the builder
  FORM_VIEWER_URL: https://dculus-forms-viewer-app.pages.dev
  # Azure Configuration
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for comprehensive scanning

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog-actions-scan@v1
        with:
          path: ./
          base: ${{ github.event.before || '' }}
          head: HEAD
          extra_args: --exclude-paths=.github/workflows/ci.yml,docker-compose.yml,.env.example --no-verification
        continue-on-error: true


  build-shared-packages:
    name: Build Shared Packages
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @dculus/types build
          pnpm --filter @dculus/utils build
          pnpm --filter @dculus/ui build

      - name: Cache built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

  lint-and-type-check:
    runs-on: ubuntu-latest
    needs: build-shared-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run linting
        run: pnpm lint

      - name: Run type checking
        run: pnpm type-check

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true  # Don't block on audit warnings initially — review and fix separately

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: build-shared-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore built packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter backend lint

      - name: Type check backend
        run: pnpm --filter backend type-check

      - name: Run unit tests with coverage
        env:
          NODE_ENV: test
          BETTER_AUTH_SECRET: test-only-secret-for-unit-tests-not-used-in-production
          PUBLIC_S3_ENDPOINT: http://localhost:9000
          PUBLIC_S3_ACCESS_KEY: test-access-key
          PUBLIC_S3_SECRET_KEY: test-secret-key
          PUBLIC_S3_BUCKET_NAME: test-public-bucket
          PRIVATE_S3_BUCKET_NAME: test-private-bucket
          PUBLIC_S3_CDN_URL: http://localhost:9000
        run: pnpm --filter backend test:coverage
        continue-on-error: true  # Report but don't block yet — set threshold violation as blocking once stable

      - name: Build backend
        run: pnpm --filter backend build

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: apps/backend/dist
          retention-days: 1

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-shared-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore built packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-pull integration PostgreSQL image
        run: docker compose -f test/integration/docker-compose.postgres.yml pull postgres

      - name: Start integration PostgreSQL
        run: docker compose -f test/integration/docker-compose.postgres.yml up -d postgres

      - name: Wait for integration PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose -f test/integration/docker-compose.postgres.yml exec -T postgres pg_isready -U dculus -d dculus_forms; then
              exit 0
            fi
            echo "Waiting for PostgreSQL (${i}/30)..."
            sleep 2
          done
          echo "PostgreSQL failed to become ready" >&2
          docker compose -f test/integration/docker-compose.postgres.yml logs postgres
          exit 1

      - name: Wait for host PostgreSQL port
        shell: bash
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5543) >/dev/null 2>&1; then
              echo "Host port 5543 is reachable"
              exit 0
            fi
            echo "Waiting for host port 5543 (${i}/30)..."
            sleep 2
          done
          echo "Host port 5543 never opened" >&2
          docker compose -f test/integration/docker-compose.postgres.yml logs postgres
          exit 1

      - name: Export integration database environment
        run: |
          echo "DATABASE_URL=postgresql://dculus:dculus_dev_password@127.0.0.1:5543/dculus_forms?sslmode=disable&gssencmode=disable" >> $GITHUB_ENV
          echo "DIRECT_URL=postgresql://dculus:dculus_dev_password@127.0.0.1:5543/dculus_forms?sslmode=disable&gssencmode=disable" >> $GITHUB_ENV
          echo "MANAGE_INTEGRATION_DOCKER=false" >> $GITHUB_ENV

      - name: Apply Prisma migrations to integration database
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          BETTER_AUTH_SECRET: test-only-secret-for-integration-tests-not-used-in-production
          PUBLIC_S3_ENDPOINT: http://localhost:9000
          PUBLIC_S3_ACCESS_KEY: test-access-key
          PUBLIC_S3_SECRET_KEY: test-secret-key
          PUBLIC_S3_BUCKET_NAME: test-public-bucket
          PRIVATE_S3_BUCKET_NAME: test-private-bucket
          PUBLIC_S3_CDN_URL: http://localhost:9000
        run: pnpm --filter backend db:migrate:deploy

      - name: Run integration tests
        id: run_integration_tests
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          MANAGE_INTEGRATION_DOCKER: ${{ env.MANAGE_INTEGRATION_DOCKER }}
          # Phase 2 fix removed the BETTER_AUTH_SECRET fallback — integration tests
          # spin up the real backend server which requires this at startup.
          BETTER_AUTH_SECRET: test-only-secret-for-integration-tests-not-used-in-production
          BETTER_AUTH_URL: http://localhost:4000
          PUBLIC_S3_ENDPOINT: http://localhost:9000
          PUBLIC_S3_ACCESS_KEY: test-access-key
          PUBLIC_S3_SECRET_KEY: test-secret-key
          PUBLIC_S3_BUCKET_NAME: test-public-bucket
          PRIVATE_S3_BUCKET_NAME: test-private-bucket
          PUBLIC_S3_CDN_URL: http://localhost:9000
        run: pnpm test:integration

      - name: Stop integration PostgreSQL
        if: always()
        run: docker compose -f test/integration/docker-compose.postgres.yml down -v

      - name: Integration test summary
        if: always()
        run: |
          echo "## 🧪 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run_integration_tests.outcome }}" = "success" ]; then
            echo "✅ All integration tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some integration tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Infrastructure:**" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerized PostgreSQL (test/integration/docker-compose.postgres.yml): ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Mock SMTP Server: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Server: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Prisma Schema: ✅" >> $GITHUB_STEP_SUMMARY

  build-form-app:
    name: Build Form App
    runs-on: ubuntu-latest
    needs: build-shared-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore built packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint form-app
        run: pnpm --filter form-app lint

      - name: Type check form-app
        run: pnpm --filter form-app type-check

      - name: Build form-app with environment variables
        env:
          VITE_CDN_ENDPOINT: ${{ secrets.VITE_CDN_ENDPOINT }}
          VITE_PIXABAY_API_KEY: ${{ secrets.VITE_PIXABAY_API_KEY }}
          VITE_API_URL: ${{ env.BACKEND_URL }}
          VITE_GRAPHQL_URL: ${{ env.BACKEND_URL }}/graphql
          VITE_FORM_VIEWER_URL: ${{ env.FORM_VIEWER_URL }}
        run: pnpm --filter form-app build

      - name: Upload form-app dist
        uses: actions/upload-artifact@v4
        with:
          name: form-app-dist-${{ github.sha }}
          path: apps/form-app/dist
          retention-days: 1

  build-form-viewer:
    name: Build Form Viewer
    runs-on: ubuntu-latest
    needs: build-shared-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore built packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint form-viewer
        run: pnpm --filter form-viewer lint

      - name: Type check form-viewer
        run: pnpm --filter form-viewer type-check

      - name: Build form-viewer
        run: pnpm --filter form-viewer build

      - name: Upload form-viewer dist
        uses: actions/upload-artifact@v4
        with:
          name: form-viewer-dist-${{ github.sha }}
          path: apps/form-viewer/dist
          retention-days: 1

  build-admin-app:
    name: Build Admin App
    runs-on: ubuntu-latest
    needs: build-shared-packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore built packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin-app
        run: pnpm --filter admin-app lint

      - name: Type check admin-app
        run: pnpm --filter admin-app type-check

      - name: Build admin-app with environment variables
        env:
          VITE_API_URL: ${{ env.BACKEND_URL }}
          VITE_GRAPHQL_URL: ${{ env.BACKEND_URL }}/graphql
        run: pnpm --filter admin-app build

      - name: Upload admin-app dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-dist-${{ github.sha }}
          path: apps/admin-app/dist
          retention-days: 1

  e2e-local:
    name: E2E Tests (Local Runner)
    runs-on: ubuntu-latest
    needs: [build-backend, build-form-app, build-form-viewer]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dculus
          POSTGRES_PASSWORD: dculus_dev_password
          POSTGRES_DB: dculus_forms_e2e
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - "5544:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dculus:dculus_dev_password@localhost:5544/dculus_forms_e2e?sslmode=disable
      DIRECT_URL: postgresql://dculus:dculus_dev_password@localhost:5544/dculus_forms_e2e?sslmode=disable
      BETTER_AUTH_SECRET: e2e-test-secret-at-least-32-chars-long-ok
      BETTER_AUTH_URL: http://localhost:4000
      NODE_ENV: test
      # Stub S3 — no real uploads in local E2E
      PUBLIC_S3_ENDPOINT: http://localhost:9000
      PUBLIC_S3_ACCESS_KEY: test-key
      PUBLIC_S3_SECRET_KEY: test-secret
      PUBLIC_S3_BUCKET_NAME: test-public
      PRIVATE_S3_BUCKET_NAME: test-private
      PUBLIC_S3_CDN_URL: http://localhost:9000
      # E2E credentials
      E2E_EMAIL: e2e@dculus-ci.test
      E2E_PASSWORD: E2eCiTest123!
      E2E_FORM_APP_URL: http://localhost:3000
      E2E_FORM_VIEWER_URL: http://localhost:5173
      E2E_BACKEND_URL: http://localhost:4000
      E2E_HEADLESS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore built packages cache
        uses: actions/cache@v4
        with:
          path: |
            packages/types/dist
            packages/utils/dist
            packages/ui/dist
            node_modules/.pnpm
          key: built-packages-${{ github.sha }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client & run migrations
        run: |
          pnpm db:generate
          pnpm db:migrate:deploy

      - name: Seed templates (no S3 uploads)
        run: |
          cd apps/backend
          DATABASE_URL=${{ env.DATABASE_URL }} \
          BETTER_AUTH_SECRET=${{ env.BETTER_AUTH_SECRET }} \
          PUBLIC_S3_ENDPOINT=${{ env.PUBLIC_S3_ENDPOINT }} \
          PUBLIC_S3_ACCESS_KEY=${{ env.PUBLIC_S3_ACCESS_KEY }} \
          PUBLIC_S3_SECRET_KEY=${{ env.PUBLIC_S3_SECRET_KEY }} \
          PUBLIC_S3_BUCKET_NAME=${{ env.PUBLIC_S3_BUCKET_NAME }} \
          PRIVATE_S3_BUCKET_NAME=${{ env.PRIVATE_S3_BUCKET_NAME }} \
          PUBLIC_S3_CDN_URL=${{ env.PUBLIC_S3_CDN_URL }} \
          NODE_ENV=test \
          npx tsx src/scripts/seed-templates-ci.ts || echo "Template seeding done (errors OK)"

      - name: Create E2E test user
        run: |
          cd apps/backend
          DATABASE_URL=${{ env.DATABASE_URL }} \
          BETTER_AUTH_SECRET=${{ env.BETTER_AUTH_SECRET }} \
          BETTER_AUTH_URL=${{ env.BETTER_AUTH_URL }} \
          PUBLIC_S3_ENDPOINT=${{ env.PUBLIC_S3_ENDPOINT }} \
          PUBLIC_S3_ACCESS_KEY=${{ env.PUBLIC_S3_ACCESS_KEY }} \
          PUBLIC_S3_SECRET_KEY=${{ env.PUBLIC_S3_SECRET_KEY }} \
          PUBLIC_S3_BUCKET_NAME=${{ env.PUBLIC_S3_BUCKET_NAME }} \
          PRIVATE_S3_BUCKET_NAME=${{ env.PRIVATE_S3_BUCKET_NAME }} \
          PUBLIC_S3_CDN_URL=${{ env.PUBLIC_S3_CDN_URL }} \
          NODE_ENV=test \
          E2E_EMAIL=${{ env.E2E_EMAIL }} \
          E2E_PASSWORD=${{ env.E2E_PASSWORD }} \
          npx tsx src/scripts/create-e2e-user.ts

      - name: Start backend
        run: |
          pnpm --filter backend build
          node apps/backend/dist/apps/backend/src/index.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        env:
          PORT: 4000

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "✅ Backend ready"
              exit 0
            fi
            echo "Waiting for backend (${i}/30)..."
            sleep 2
          done
          echo "❌ Backend failed to start" && exit 1

      - name: Build & serve form-app (localhost:3000)
        run: |
          VITE_API_URL=http://localhost:4000 \
          VITE_GRAPHQL_URL=http://localhost:4000/graphql \
          VITE_FORM_VIEWER_URL=http://localhost:5173 \
          pnpm --filter form-app build
          pnpm --filter form-app preview --port 3000 --host &

      - name: Build & serve form-viewer (localhost:5173)
        run: |
          VITE_API_URL=http://localhost:4000 \
          VITE_GRAPHQL_URL=http://localhost:4000/graphql \
          pnpm --filter form-viewer build
          pnpm --filter form-viewer preview --port 5173 --host &

      - name: Wait for frontends
        run: |
          for i in {1..30}; do
            FA=$(curl -sf http://localhost:3000 > /dev/null 2>&1 && echo ok || echo -)
            FV=$(curl -sf http://localhost:5173 > /dev/null 2>&1 && echo ok || echo -)
            [ "$FA" = "ok" ] && [ "$FV" = "ok" ] && echo "✅ Both frontends ready" && exit 0
            echo "Waiting for frontends form-app=$FA viewer=$FV (${i}/30)..."
            sleep 3
          done
          echo "❌ Frontends failed to start" && exit 1

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload E2E screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-local-screenshots
          path: test-results/screenshots/
          if-no-files-found: ignore

  create-release-artifacts:
    name: Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [build-form-app, build-form-viewer, build-admin-app, build-backend]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Download form-app dist
        uses: actions/download-artifact@v4
        with:
          name: form-app-dist-${{ github.sha }}
          path: apps/form-app/dist

      - name: Download form-viewer dist
        uses: actions/download-artifact@v4
        with:
          name: form-viewer-dist-${{ github.sha }}
          path: apps/form-viewer/dist

      - name: Download admin-app dist
        uses: actions/download-artifact@v4
        with:
          name: admin-app-dist-${{ github.sha }}
          path: apps/admin-app/dist

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: apps/backend/dist

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Packaging release artifacts for version: $VERSION"

      - name: Create backend release directory
        run: |
          echo "Preparing backend release package..."
          mkdir -p backend-release

          # Copy built files
          cp -r apps/backend/dist backend-release/
          cp -r apps/backend/prisma backend-release/
          cp apps/backend/package.json backend-release/
          cp apps/backend/.env.example backend-release/
          cp apps/backend/README-DEPLOYMENT.md backend-release/

          # Copy node_modules (production only)
          cd apps/backend
          pnpm install --prod --frozen-lockfile
          cd ../..
          cp -r apps/backend/node_modules backend-release/

          echo "Backend release package prepared"
          du -sh backend-release/

      - name: Create backend ZIP archive
        run: |
          cd backend-release
          zip -r ../backend-build-v${{ steps.version.outputs.version }}.zip .
          cd ..
          ls -lh backend-build-v${{ steps.version.outputs.version }}.zip
          echo "Backend ZIP size: $(du -h backend-build-v${{ steps.version.outputs.version }}.zip | cut -f1)"

      - name: Create form-app ZIP archive
        run: |
          cd apps/form-app
          zip -r ../../form-app-build-v${{ steps.version.outputs.version }}.zip dist/
          cd ../..
          ls -lh form-app-build-v${{ steps.version.outputs.version }}.zip

      - name: Create form-viewer ZIP archive
        run: |
          cd apps/form-viewer
          zip -r ../../form-viewer-build-v${{ steps.version.outputs.version }}.zip dist/
          cd ../..
          ls -lh form-viewer-build-v${{ steps.version.outputs.version }}.zip

      - name: Create admin-app ZIP archive
        run: |
          cd apps/admin-app
          zip -r ../../admin-app-build-v${{ steps.version.outputs.version }}.zip dist/
          cd ../..
          ls -lh admin-app-build-v${{ steps.version.outputs.version }}.zip

      - name: Upload form-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: form-app-build-v${{ steps.version.outputs.version }}
          path: form-app-build-v${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Upload form-viewer artifact
        uses: actions/upload-artifact@v4
        with:
          name: form-viewer-build-v${{ steps.version.outputs.version }}
          path: form-viewer-build-v${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Upload admin-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-app-build-v${{ steps.version.outputs.version }}
          path: admin-app-build-v${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-v${{ steps.version.outputs.version }}
          path: backend-build-v${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Artifact Summary
        run: |
          echo "## 📦 Release Artifacts Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ backend-build-v${{ steps.version.outputs.version }}.zip" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ form-app-build-v${{ steps.version.outputs.version }}.zip" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ form-viewer-build-v${{ steps.version.outputs.version }}.zip" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ admin-app-build-v${{ steps.version.outputs.version }}.zip" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "These artifacts will be attached to the GitHub Release." >> $GITHUB_STEP_SUMMARY

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: create-release-artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download form-app artifact
        uses: actions/download-artifact@v4
        with:
          name: form-app-build-v${{ steps.version.outputs.version }}

      - name: Download form-viewer artifact
        uses: actions/download-artifact@v4
        with:
          name: form-viewer-build-v${{ steps.version.outputs.version }}

      - name: Download admin-app artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-app-build-v${{ steps.version.outputs.version }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build-v${{ steps.version.outputs.version }}

      - name: Verify downloaded artifacts
        run: |
          echo "Verifying downloaded artifacts..."
          ls -lh *.zip
          echo "All artifacts downloaded successfully!"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.tag_name }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'rc') }}
          generate_release_notes: true
          files: |
            backend-build-v${{ steps.version.outputs.version }}.zip
            form-app-build-v${{ steps.version.outputs.version }}.zip
            form-viewer-build-v${{ steps.version.outputs.version }}.zip
            admin-app-build-v${{ steps.version.outputs.version }}.zip
          body: |
            ## 🚀 Dculus Forms Release ${{ steps.version.outputs.tag_name }}

            ### 📦 Build Artifacts

            This release includes production-ready build artifacts for all applications:

            **Backend:**
            - **backend-build-v${{ steps.version.outputs.version }}.zip** - Backend API (Node.js)
              - Includes compiled code, dependencies, and deployment documentation
              - Alternative to Docker for direct Node.js deployment
              - See included `README-DEPLOYMENT.md` for setup instructions

            **Frontend Applications:**
            - **form-app-build-v${{ steps.version.outputs.version }}.zip** - Form Builder Application
            - **form-viewer-build-v${{ steps.version.outputs.version }}.zip** - Form Viewer Application
            - **admin-app-build-v${{ steps.version.outputs.version }}.zip** - Admin Dashboard Application

            > **⚠️ IMPORTANT: Security Notice**
            >
            > These build artifacts are **generic builds without hardcoded secrets or API keys**.
            > You MUST configure environment variables in your hosting provider before deployment.
            > Never commit secrets to version control or include them in public releases.

            ### 📋 Deployment Instructions

            **Backend Deployment (Choose One):**

            **Option 1: Docker (Recommended)**
            ```bash
            # Pull using version tag with v prefix
            docker pull dculus/forms-backend:v${{ steps.version.outputs.version }}
            
            # Or pull latest
            docker pull dculus/forms-backend:latest
            
            # Run with environment file
            docker run -d -p 4000:4000 --env-file .env dculus/forms-backend:v${{ steps.version.outputs.version }}
            ```

            **Available Docker Tags for this Release:**
            - `dculus/forms-backend:v${{ steps.version.outputs.version }}` (e.g., v1.2.3)
            - `dculus/forms-backend:v{{ steps.version.outputs.major }}.{{ steps.version.outputs.minor }}` (e.g., v1.2)
            - `dculus/forms-backend:v{{ steps.version.outputs.major }}` (e.g., v1)
            - `dculus/forms-backend:latest` (always points to the most recent stable release)
            
            **Option 2: Node.js Direct**
            ```bash
            unzip backend-build-v${{ steps.version.outputs.version }}.zip
            cd backend-build-v${{ steps.version.outputs.version }}
            cp .env.example .env
            # Edit .env with your values
            node dist/apps/backend/src/index.js
            ```

            See included `README-DEPLOYMENT.md` for detailed backend deployment instructions including PM2, systemd, and production best practices.

            **Frontend Deployment:**

            1. Download the desired application ZIP file from the assets below
            2. Extract: `unzip <app-name>.zip`
            3. **Configure environment variables** in your hosting provider (see below)
            4. Deploy the `dist/` folder:
               - **Cloudflare Pages**: `wrangler pages deploy dist/`
               - **Netlify**: `netlify deploy --prod --dir=dist`
               - **Vercel**: `vercel --prod dist/`
               - **AWS S3**: `aws s3 sync dist/ s3://bucket --acl public-read`
               - **nginx**: Copy `dist/` to web root

            ### 🔧 Environment Variables Configuration

            **⚠️ REQUIRED:** Configure these in your hosting provider or .env file:

            **Backend** (see `.env.example`):
            - `DATABASE_URL` - MongoDB connection string
            - `BETTER_AUTH_SECRET` - Min 32 character secret
            - `BETTER_AUTH_URL` - Public API URL
            - `CORS_ORIGINS` - Allowed frontend URLs
            - `S3_*` - S3 storage configuration
            - Full list in `README-DEPLOYMENT.md`

            **Form App:**
            - `VITE_API_URL` - Backend API URL
            - `VITE_GRAPHQL_URL` - GraphQL endpoint
            - `VITE_FORM_VIEWER_URL` - Base URL for the public form viewer
            - `VITE_CDN_ENDPOINT` - CDN endpoint
            - `VITE_PIXABAY_API_KEY` - Pixabay key

            **Admin App:**
            - `VITE_API_URL` - Backend API URL
            - `VITE_GRAPHQL_URL` - GraphQL endpoint

            **Form Viewer:**
            - No build-time env vars needed

            ### 📚 Documentation

            For detailed deployment guides and documentation, visit the repository README.

      - name: Release Summary
        run: |
          echo "## 🎉 GitHub Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release**: ${{ steps.version.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Attached Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- backend-build-v${{ steps.version.outputs.version }}.zip (Backend API)" >> $GITHUB_STEP_SUMMARY
          echo "- form-app-build-v${{ steps.version.outputs.version }}.zip (Form Builder)" >> $GITHUB_STEP_SUMMARY
          echo "- form-viewer-build-v${{ steps.version.outputs.version }}.zip (Form Viewer)" >> $GITHUB_STEP_SUMMARY
          echo "- admin-app-build-v${{ steps.version.outputs.version }}.zip (Admin Dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Deployment Options:" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: Docker image or Node.js ZIP artifact" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: Deploy to Cloudflare, Netlify, Vercel, AWS, Azure, or nginx" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Visit the release page to download artifacts and follow deployment instructions." >> $GITHUB_STEP_SUMMARY

  build-and-push:
    needs: [lint-and-type-check, integration-tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Semantic versioning for tags (e.g., v1.2.3 -> v1.2.3, v1.2, v1)
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            # Branch-based tags (e.g., main, develop)
            type=ref,event=branch
            type=ref,event=pr
            # Full SHA tag for automation reliability (e.g., sha-<full_sha>)
            type=sha,format=long
            # Latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Custom tag from workflow_dispatch
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=Dculus Forms Backend
            org.opencontainers.image.description=Express.js + GraphQL backend for Dculus Forms with MongoDB and collaborative editing
            org.opencontainers.image.vendor=Dculus Industries
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Display Docker tags
        run: |
          echo "## 🏷️ Docker Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following tags will be applied to the Docker image:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "📌 **Version Release Detected**: v$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Docker Pull Commands**:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "# Pull specific version" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "# Or pull latest" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1


      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🚀 Docker Hub Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**Size**: $(docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format 'table {{.Size}}' | tail -1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Deploy Commands:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 4000:4000 --name dculus-backend \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e DATABASE_URL='your-db-url' \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e BETTER_AUTH_SECRET='your-auth-secret' \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [security-scan, build-shared-packages, lint-and-type-check, build-backend, integration-tests, build-and-push, e2e-local]
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo "## 🚀 Build Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shared Packages | ${{ needs.build-shared-packages.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint-and-type-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build | ${{ needs.build-backend.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (Local) | ${{ needs.e2e-local.result == 'success' && '✅' || needs.e2e-local.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build & Push | ${{ needs.build-and-push.result == 'success' && '✅' || needs.build-and-push.result == 'skipped' && '⏭️ Skipped (tags only)' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.build-and-push.result }}" == "success" ]]; then
            echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
            echo "✅ Backend Docker image built and pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
            echo "📦 Ready for deployment via multi-cloud-deployment.yml workflow" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.build-and-push.result }}" == "skipped" ]]; then
            echo "### ℹ️ Docker Build Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Docker images are only built on version tags (e.g., v1.2.3) or main branch" >> $GITHUB_STEP_SUMMARY
          fi
